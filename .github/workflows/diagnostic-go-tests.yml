name: Diagnostic Go tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changed-packages:
    name: Diagnostic ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: runtime-app
            package: ./runtime/app
          - id: project
            package: ./internal/project
          - id: language
            package: ./internal/lang
          - id: cli
            package: ./cmd/gowdk

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go 1.26.4
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run package with concise failure output
        shell: bash
        env:
          TEST_PACKAGE: ${{ matrix.package }}
          TEST_ID: ${{ matrix.id }}
        run: |
          set +e
          log="${RUNNER_TEMP}/gowdk-${TEST_ID}-tests.log"
          go test -count=1 "${TEST_PACKAGE}" > "${log}" 2>&1
          status=$?
          tail -n 300 "${log}"
          exit "${status}"

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.id }}-test-log
          path: ${{ runner.temp }}/gowdk-${{ matrix.id }}-tests.log
          retention-days: 3
