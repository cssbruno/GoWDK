services:
  - type: web
    name: gowdk-page
    runtime: go
    # The docs site lives in the GOWDK monorepo under docs-site/. Render checks
    # out the whole repo and runs the build from this subdirectory; the parent
    # directory (..) is the framework root whose docs/ tree syncdocs renders.
    #
    # This deploys as a Go binary (not a static site): main.go embeds dist/site
    # and serves it, reading $PORT from Render. The build must generate
    # dist/site BEFORE `go build`, because main.go uses //go:embed dist/site.
    rootDir: docs-site
    buildCommand: |
      mkdir -p tools
      curl -fsSL -o tools/tailwindcss \
        https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
      chmod +x tools/tailwindcss
      go run ./cmd/syncdocs
      rm -rf dist/site
      go run github.com/cssbruno/gowdk/cmd/gowdk build
      mkdir -p dist/site/assets
      cp -R assets/. dist/site/assets/
      cp assets/favicon.ico dist/site/favicon.ico
      go build -tags netgo -ldflags '-s -w' -o app .
    startCommand: ./app
