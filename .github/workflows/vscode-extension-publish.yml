name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      pre_release:
        description: Publish as a VS Code Marketplace pre-release
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: vscode-extension-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish extension
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: editors/vscode

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Install locked extension tooling
        run: npm ci

      - name: Verify extension
        run: |
          node scripts/sync-version.js --check
          node --check extension.js
          node --check extension-core.js
          node --test *.test.js

      - name: Package extension
        run: |
          rm -f *.vsix
          node scripts/sync-version.js
          npx --no-install vsce package \
            --no-dependencies \
            --baseContentUrl https://github.com/${{ github.repository }}/blob/${{ github.ref_name }} \
            --baseImagesUrl https://github.com/${{ github.repository }}/raw/${{ github.ref_name }}
          version="$(node -e 'process.stdout.write(require("./package.json").version)')"
          test -f "gowdk-vscode-${version}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gowdk-vscode-vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          PRE_RELEASE: ${{ inputs.pre_release || false }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "Missing VSCE_PAT secret. Create a Visual Studio Marketplace PAT with Marketplace Manage scope and add it as a repository or environment secret."
            exit 1
          fi

          version="$(node -e 'process.stdout.write(require("./package.json").version)')"
          publish_args=(
            publish
            --pat "$VSCE_PAT"
            --packagePath "gowdk-vscode-${version}.vsix"
            --baseContentUrl "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}"
            --baseImagesUrl "https://github.com/${{ github.repository }}/raw/${{ github.ref_name }}"
          )

          if [ "$PRE_RELEASE" = "true" ]; then
            publish_args+=(--pre-release)
          fi

          node scripts/sync-version.js
          npx --no-install vsce "${publish_args[@]}"
