services:
  - type: web
    name: gowdk-page
    runtime: go
    rootDir: docs-site
    # main.go serves dist/site, so the build must generate the GOWDK site output
    # before compiling the Go server binary.
    buildCommand: |
      set -euo pipefail
      scripts/install-tailwind-linux.sh
      scripts/build-production.sh
    startCommand: ./app
    buildFilter:
      paths:
        - docs-site/**
        - docs/**
        - addons/**
        - cmd/**
        - internal/**
        - runtime/**
        - gowdk.go
        - go.mod
        - go.sum
