name: Release Artifact Smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published release tag to verify, for example v0.1.5
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gowdk-linux-amd64
          - os: macos-13
            asset: gowdk-darwin-amd64
          - os: macos-14
            asset: gowdk-darwin-arm64
          - os: windows-latest
            asset: gowdk-windows-amd64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download, checksum, and run artifact
        shell: bash
        run: scripts/smoke-release-artifact.sh "${{ inputs.version }}" "${{ matrix.asset }}"
