name: Temporary source snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Archive source tree
        run: tar -czf "$RUNNER_TEMP/gowdk-source.tar.gz" --exclude=.git .
      - name: Upload source tree
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: gowdk-source-snapshot
          path: ${{ runner.temp }}/gowdk-source.tar.gz
          retention-days: 1
