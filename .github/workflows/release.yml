name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

jobs:
  package:
    name: Package release artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify release gates
        run: |
          go version
          go env GOVERSION
          scripts/check-release-policy.sh
          scripts/validate-release-notes.sh .github/release-note-template.md
          scripts/validate-release-notes.sh docs/engineering/release-notes-v0.2.md
          scripts/test-go-modules.sh
          scripts/vulncheck-go-modules.sh
          go build ./cmd/gowdk
          node editors/vscode/scripts/sync-version.js --check
          node --check editors/vscode/extension.js
          node --check editors/vscode/extension-core.js
          node --test editors/vscode/*.test.js
          examples="examples/pages/*.gwdk examples/actions/*.gwdk examples/partials/*.gwdk examples/api/*.gwdk examples/ssr/*.gwdk examples/go-interop/*.gwdk examples/components/base/*.gwdk examples/components/css/*.gwdk examples/components/assets/*.gwdk examples/embed/*.gwdk examples/css/*.gwdk examples/tailwind/*.gwdk"
          go run ./cmd/gowdk check --ssr $examples
          go run ./cmd/gowdk manifest --ssr $examples
          go run ./cmd/gowdk sitemap --ssr $examples
          go run ./cmd/gowdk routes --ssr $examples
          (
            set -euxo pipefail
            cd examples/login
            rm -rf .gowdk bin dist
            go run ../../cmd/gowdk build
            output=".gowdk/output/login"
            test -f "$output/index.html"
            test -f "$output/dashboard/index.html"
            test -x bin/login
            test -x bin/login-frontend
            test -x bin/login-backend
            login_css="$(sed -nE 's/.*"login.css": "([^"]+)".*/\1/p' "$output/gowdk-assets.json" | head -n1)"
            echo "login.css resolves to ${login_css}"
            test -n "$login_css"
            test -f "$output/$login_css"
            go test ./src/features/auth
          )
          rm -rf /tmp/gowdk-css-build
          go run ./cmd/gowdk build --config examples/css/gowdk.config.go --out /tmp/gowdk-css-build examples/css/styled.page.gwdk
          grep -F '<link rel="stylesheet" href="/assets/site.css">' /tmp/gowdk-css-build/styled/index.html
          rm -rf /tmp/gowdk-embed-build /tmp/gowdk-embed-app /tmp/gowdk-embed-site
          go run ./cmd/gowdk build --out /tmp/gowdk-embed-build --app /tmp/gowdk-embed-app --bin /tmp/gowdk-embed-site examples/embed/site.page.gwdk
          test -x /tmp/gowdk-embed-site
          rm -rf /tmp/gowdk-hybrid-build /tmp/gowdk-hybrid-app /tmp/gowdk-hybrid-site
          go run ./cmd/gowdk build --ssr --out /tmp/gowdk-hybrid-build --app /tmp/gowdk-hybrid-app --bin /tmp/gowdk-hybrid-site examples/ssr/hybrid-static.page.gwdk
          test -x /tmp/gowdk-hybrid-site
          go run ./cmd/gowdk routes --ssr examples/ssr/hybrid-static.page.gwdk > /tmp/gowdk-hybrid-routes.json
          grep -F '"kind": "ssr"' /tmp/gowdk-hybrid-routes.json
          grep -F '"pageId": "hybrid.static"' /tmp/gowdk-hybrid-routes.json
          grep -F '"code": "spa_disabled"' /tmp/gowdk-hybrid-routes.json
          rm -rf /tmp/gowdk-component-assets
          go run ./cmd/gowdk build --out /tmp/gowdk-component-assets examples/components/assets/*.gwdk
          test -f /tmp/gowdk-component-assets/components/assets/index.html
          grep -F '"assets/gowdk/components/componentassets/AssetBadge/badge.svg"' /tmp/gowdk-component-assets/gowdk-assets.json
          grep -F 'assets/gowdk/components/componentassets/AssetBadge/badge.' /tmp/gowdk-component-assets/gowdk-assets.json

      - name: Build CLI artifacts
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gowdk-linux-amd64 ./cmd/gowdk
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/gowdk-linux-arm64 ./cmd/gowdk
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gowdk-darwin-amd64 ./cmd/gowdk
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/gowdk-darwin-arm64 ./cmd/gowdk
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/gowdk-windows-amd64.exe ./cmd/gowdk
          ./dist/gowdk-linux-amd64 version --json | grep -F '"version":'

      - name: Package VS Code extension
        run: |
          node scripts/sync-version.js
          node scripts/package-vsix.js
        working-directory: editors/vscode

      - name: Collect VS Code package
        run: |
          find editors/vscode -maxdepth 1 -name '*.vsix' -exec cp {} dist/ \;

      - name: Generate checksums
        run: |
          (cd dist && sha256sum * > checksums.txt)
          (cd dist && sha256sum -c checksums.txt)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gowdk-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: dist/*

      - name: Select release notes
        id: release_notes
        run: |
          version="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          line="$(printf '%s\n' "$version" | sed -E 's/^v?([0-9]+)\.([0-9]+).*/v\1.\2/')"
          notes="docs/engineering/release-notes-${line}.md"
          if [ ! -f "$notes" ]; then
            notes=".github/release-note-template.md"
          fi
          echo "path=$notes" >> "$GITHUB_OUTPUT"

      - name: Validate selected release notes
        run: scripts/validate-release-notes.sh "${{ steps.release_notes.outputs.path }}"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: GOWDK ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: dist/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: true

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          expected="
          checksums.txt
          gowdk-linux-amd64
          gowdk-linux-arm64
          gowdk-darwin-amd64
          gowdk-darwin-arm64
          gowdk-windows-amd64.exe
          "
          vsix="$(find dist -maxdepth 1 -name 'gowdk-vscode-*.vsix' -printf '%f\n' | head -n1)"
          test -n "$vsix"
          expected="$expected
          $vsix
          "
          assets="$(gh release view "$RELEASE_VERSION" --json assets --jq '.assets[].name')"
          printf '%s\n' "$assets"
          for asset in $expected; do
            printf '%s\n' "$assets" | grep -Fx "$asset" >/dev/null || {
              echo "release $RELEASE_VERSION missing asset: $asset" >&2
              exit 1
            }
          done
