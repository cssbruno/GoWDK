name: Cache Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  actions: write
  contents: read

jobs:
  prune:
    name: Prune GitHub Actions caches
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prune old CodeQL overlay caches
        env:
          GH_TOKEN: ${{ github.token }}
          GOWDK_CACHE_PRUNE_KEEP: '20'
        run: scripts/prune-github-caches.sh "${{ github.repository }}"
