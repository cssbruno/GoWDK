name: Labeler

# Applies labels from .github/labeler.yml to PRs based on changed paths.
# Uses pull_request_target so it works for PRs from forks; it only reads the
# diff's file list, never runs PR code.

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path labels
    runs-on: ubuntu-latest
    steps:
      - name: Label PR
        uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          sync-labels: false
