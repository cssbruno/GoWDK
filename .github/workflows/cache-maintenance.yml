name: Cache Maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

permissions:
  actions: write
  contents: read

jobs:
  prune:
    name: Prune GitHub Actions caches
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Prune old CodeQL overlay caches
        env:
          GH_TOKEN: ${{ github.token }}
          GOWDK_CACHE_PRUNE_KEEP: '20'
        run: scripts/prune-github-caches.sh "${{ github.repository }}"
